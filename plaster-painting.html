<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny and Quill LLC - Custom Plaster Painting Party Kits</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* 全域樣式設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        /* 網頁主體容器，還原海報/一頁式網頁的置中寬度 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 1. 導覽列 Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            background: #fce181; 
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover {
            color: #e2b74c;
        }

        .btn-order-now {
            background-color: #fce181;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            transition: background 0.2s;
        }

        .btn-order-now:hover {
            background-color: #fbd658;
        }

        /* 2. 主視覺看板 Hero Banner */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url('https://images.unsplash.com/photo-1530103862676-de8c9debad1d?q=80&w=1200') center/cover;
            color: #fff;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .hero p {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            max-width: 600px;
            margin: 0 auto 25px auto;
            line-height: 1.5;
        }

        .btn-quote {
            background-color: #b3dbf1;
            color: #2c5270;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            border: 2px solid #fff;
            display: inline-block;
            transition: transform 0.2s;
        }

        .btn-quote:hover {
            transform: scale(1.03);
        }

        /* 區塊通用標題 */
        .section-title {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 35px 0 20px 0;
            text-transform: uppercase;
        }

        /* 3. 特色區塊 Why We Are Different */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 0 25px;
        }

        .feature-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .feature-card h3 {
            font-size: 11px;
            font-weight: 700;
            line-height: 1.3;
            text-transform: uppercase;
        }

        /* 4. 套餐方案 Popular Party Packages */
        .packages-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 25px;
        }

        .package-card {
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .package-img {
            width: 100%;
            height: 160px;
            background-color: #eee;
            object-fit: cover;
        }

        .package-content {
            padding: 15px;
        }

        .package-content h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .package-details {
            list-style: none;
            font-size: 11px;
            color: #555;
            margin-bottom: 15px;
        }

        .package-details li {
            margin-bottom: 4px;
            position: relative;
            padding-left: 12px;
        }

        .package-details li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #333;
        }

        .package-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-info {
            font-size: 11px;
            font-weight: 700;
        }

        .btn-action {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }
        .btn-blue { background-color: #b3dbf1; color: #2c5270; }
        .btn-yellow { background-color: #fce181; color: #524317; }

        /* 5. 訂購流程 Easy Order Process */
