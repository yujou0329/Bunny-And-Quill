<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny and Quill LLC - Custom Plaster Painting Party Kits</title>
    <style>
        /* 全域樣式設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        /* 一頁式網頁主體容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 1. 導覽列 Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .logo-avatar {
            width: 35px;
            height: 35px;
            background-color: #ffeef2;
            border: 2px solid #ffccd5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover {
            color: #e2b74c;
        }

        .btn-order-now {
            background-color: #fce181;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        /* 2. 主視覺看板 Hero Banner - 已修正為讀取本機 hero-bg.jpg */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url('hero-bg.jpg') center/cover;
            color: #fff;
            text-align: center;
            padding: 70px 20px;
        }

        .hero h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .hero p {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            max-width: 600px;
            margin: 0 auto 25px auto;
            line-height: 1.5;
            color: #e1f0fa;
        }

        .btn-quote {
            background-color: #b3dbf1;
            color: #2c5270;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            border: 2px solid #fff;
            display: inline-block;
        }

        /* 區塊通用標題 */
        .section-title {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 35px 0 20px 0;
            text-transform: uppercase;
            color: #222;
        }

        /* 3. 特色區塊 Why We Are Different */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 0 25px;
        }

        .feature-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 25px 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .feature-card h3 {
            font-size: 11px;
            font-weight: 700;
            line-height: 1.3;
            text-transform: uppercase;
            color: #444;
        }

        /* 4. 套餐方案 Popular Party Packages */
        .packages-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 25px;
        }

        .package-card {
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* 方案圖片佔位區塊（可依需求替換為本機圖檔，如 url('package-a.jpg')） */
        .package-img-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(45deg, #f3e7e9 0%, #e3eeff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #78909c;
            font-size: 12px;
            font-weight: 600;
        }
        .package-img-placeholder::before { content: "🎨"; font-size: 36px; margin-bottom: 5px; }
        .bg-package-b { background: linear-gradient(45deg, #fdfcfb 0%, #e2d1c3 100%); }
        .bg-package-b::before { content: "🎁"; }

        .package-content {
            padding: 15px;
        }

        .package-content h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #222;
        }

        .package-details {
            list-style: none;
            font-size: 11px;
            color: #555;
            margin-bottom: 15px;
        }

        .package-details li {
            margin-bottom: 4px;
            position: relative;
            padding-left: 12px;
        }

        .package-details li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #333;
        }

        .package-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-info {
            font-size: 11px;
            font-weight: 700;
        }

        .btn-action {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }
        .btn-blue { background-color: #b3dbf1; color: #2c5270; }
        .btn-yellow { background-color: #fce181; color: #524317; }

        /* 5. 訂購流程 Easy Order Process */
        .process-container {
            background-color: #ffffff;
            padding: 10px 25px;
        }

        .process-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

            flex: 1;
        }
